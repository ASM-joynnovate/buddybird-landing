<!DOCTYPE html>
<!--
  og-card.html — buddybird.xyz 링크 공유 미리보기(og-image.png) 생성용 소스.
  헤드리스 Chrome로 1200×630 렌더 → og-image.png. 디자인 수정 후 재렌더하면 됨.
  (사이트 본문이 아니라 OG 이미지 빌드용 파일입니다.)
-->
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px; overflow: hidden; position: relative;
    background: #FFFBF5;
    font-family: 'Nunito', 'Pretendard Variable', Pretendard, -apple-system, system-ui, sans-serif;
    color: #3C3C3C; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  /* 우측 상단 은은한 브랜드 글로우 */
  .glow { position: absolute; top: -180px; right: -120px; width: 620px; height: 620px;
          border-radius: 50%; background: radial-gradient(circle, rgba(255,150,0,0.14) 0%, rgba(255,150,0,0) 70%); }
  .wrap { position: relative; z-index: 1; display: flex; align-items: center; height: 100%; }
  .left { padding: 0 0 0 84px; width: 640px; display: flex; flex-direction: column; gap: 26px; }
  .brand { display: flex; align-items: center; gap: 16px; }
  .logo { width: 64px; height: 64px; border-radius: 16px; display: block;
          box-shadow: 0 6px 14px rgba(0,0,0,0.18); }
  .wordmark { font-weight: 900; font-size: 34px; letter-spacing: -0.01em; }
  h1 { margin: 0; font-weight: 900; font-size: 52px; line-height: 1.14; letter-spacing: -0.02em; }
  .chip { align-self: flex-start; display: inline-flex; align-items: center; gap: 9px;
          background: #fff; border: 2px solid #E5E5E5; border-radius: 9999px; padding: 11px 20px;
          font-weight: 800; font-size: 19px; color: #5A5A5A; box-shadow: 0 3px 0 #E5E5E5; }
  .chip b { color: #FF9600; font-weight: 900; }

  /* 우측 폰 목업 (index.html hero 목업 스타일 재사용) */
  .phone { position: absolute; right: 96px; top: 56px; z-index: 1; width: 360px; padding: 2px;
           border-radius: 50px; background: linear-gradient(135deg,#888 0%,#333 35%,#000 100%);
           box-shadow: 0 1px 2px rgba(0,0,0,0.15),0 6px 12px 2px rgba(0,0,0,0.10),
                       0 16px 32px 10px rgba(0,0,0,0.06),0 32px 64px 24px rgba(0,0,0,0.05); }
  .phone .body { padding: 6px; border-radius: 48px; background: #181818; }
  .phone .screen { position: relative; border-radius: 42px; overflow: hidden; line-height: 0; }
  .phone img { display: block; width: 100%; height: auto; }
  .phone .ring { position: absolute; inset: 0; border-radius: 42px; pointer-events: none; z-index: 3;
                 box-shadow: inset 0 0 4px 1px rgba(0,0,0,0.40); }
  .phone .shine { position: absolute; inset: 0; border-radius: 42px; pointer-events: none; z-index: 4;
                  background: linear-gradient(125deg,rgba(255,255,255,0.18) 0%,rgba(255,255,255,0.04) 12%,rgba(255,255,255,0) 28%); }
  .phone .island { position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
                   width: 115px; height: 31px; border-radius: 999px; background: #0a0a0a; z-index: 6;
                   display: flex; align-items: center; justify-content: flex-end; padding-right: 9px; }
  .phone .lens { width: 13px; height: 13px; border-radius: 50%;
                 background: radial-gradient(circle at 38% 35%,#26313a 0%,#070b0e 70%); }

  /* 떠 있는 배지 */
  .badge { position: absolute; z-index: 2; background: #fff; border: 2px solid #E5E5E5;
           border-radius: 16px; box-shadow: 0 4px 0 #E5E5E5; padding: 12px 16px;
           display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 17px; }
  .badge .ic { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center;
               justify-content: center; font-size: 18px; }
  .badge.b1 { top: 70px; right: 360px; }
  .badge.b1 .ic { background: rgba(255,150,0,0.14); }
  .badge.b2 { bottom: 92px; right: 76px; }
  .badge.b2 .ic { background: rgba(28,176,246,0.14); }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="wrap">
    <div class="left">
      <div class="brand">
        <img class="logo" src="../assets/icons/app-icon.png" alt="BuddyBird">
        <span class="wordmark">BuddyBird</span>
      </div>
      <h1>집을 비운 사이에도,<br>AI가 대신 말을 가르칩니다</h1>
      <span class="chip"><b>AI Agent</b>&nbsp;앵무새 단어 학습 서비스</span>
    </div>
  </div>

  <div class="badge b1"><span class="ic">🔥</span>학습 7일 연속</div>
  <div class="phone">
    <div class="body">
      <div class="screen">
        <img src="../assets/images/ko/app-learning.png" alt="BuddyBird 앱 화면" />
        <div class="ring"></div>
        <div class="shine"></div>
        <div class="island"><div class="lens"></div></div>
      </div>
    </div>
  </div>
  <div class="badge b2"><span class="ic">🧠</span>발음 교정</div>
</body>
</html>
