<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BuddyBird</title>
<meta name="description" content="BuddyBird — an AI service that teaches your parrot new words. 앵무새 단어 학습 AI 서비스.">

<!-- OG: JS를 실행하지 않는 소셜 크롤러가 루트 공유 링크에서도 미리보기를 얻도록 유지 -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="BuddyBird">
<meta property="og:url" content="https://buddybird.xyz/">
<meta property="og:title" content="BuddyBird — AI teaches your parrot to talk">
<meta property="og:description" content="An AI service that keeps teaching your parrot new words even while you're away. 앵무새 단어 학습 AI 서비스.">
<meta property="og:image" content="https://buddybird.xyz/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="BuddyBird — AI teaches your parrot to talk">
<meta name="twitter:description" content="An AI service that keeps teaching your parrot new words even while you're away.">
<meta name="twitter:image" content="https://buddybird.xyz/assets/og-image.png">

<!-- 루트는 접속 국가/언어에 따라 /ko/ 또는 /en/ 으로 연결하는 라우터. 실제 콘텐츠는 각 언어 경로에 있음 -->
<link rel="alternate" hreflang="ko" href="https://buddybird.xyz/ko/">
<link rel="alternate" hreflang="en" href="https://buddybird.xyz/en/">
<link rel="alternate" hreflang="x-default" href="https://buddybird.xyz/ko/">
<meta name="robots" content="noindex,follow">
<meta name="theme-color" content="#FF9600">
<link rel="icon" type="image/png" href="/assets/icons/favicon.png">
<link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
<script>
(function () {
  // 목적지 언어(ko/en)를 정해 해시·쿼리를 보존하며 이동한다.
  var suffix = location.search + location.hash;
  function go(lang) { location.replace('/' + lang + '/' + suffix); }

  // 1) 이전에 선택/조회한 언어가 있으면 그대로 존중 (수동 전환 기억)
  try {
    var pref = localStorage.getItem('bb-lang');
    if (pref === 'ko' || pref === 'en') { go(pref); return; }
  } catch (e) {}

  // 3) 폴백: 브라우저/시스템 언어 (한국어면 ko, 그 외 en)
  function byLang() {
    var l = (navigator.language || (navigator.languages && navigator.languages[0]) || '').toLowerCase();
    go(l.indexOf('ko') === 0 ? 'ko' : 'en');
  }

  // 2) 우선: Cloudflare가 요청 헤더로 판별한 접속 국가 (loc=KR ...). 한국만 ko, 나머지 en
  try {
    fetch('/cdn-cgi/trace', { cache: 'no-store' })
      .then(function (r) { return r.text(); })
      .then(function (t) {
        var m = t.match(/(?:^|\n)loc=([A-Z]{2})/);
        if (m) { go(m[1] === 'KR' ? 'ko' : 'en'); }
        else { byLang(); }
      })
      .catch(byLang);
  } catch (e) { byLang(); }
})();
</script>
</head>
<body style="margin:0;font-family:'Nunito',-apple-system,system-ui,sans-serif;background:#FFFBF5;color:#3C3C3C;">
  <!-- JS가 꺼져 있거나 리다이렉트가 지연될 때의 수동 진입점 -->
  <noscript>
    <div style="max-width:480px;margin:96px auto;padding:0 24px;text-align:center;">
      <p style="font-weight:900;font-size:22px;margin:0 0 8px;">BuddyBird</p>
      <p style="font-weight:700;color:#777;margin:0 0 20px;">Choose your language · 언어를 선택하세요</p>
      <p style="font-weight:800;"><a href="/en/" style="color:#FF9600;">English</a> &nbsp;·&nbsp; <a href="/ko/" style="color:#FF9600;">한국어</a></p>
    </div>
  </noscript>
  <div style="max-width:480px;margin:96px auto;padding:0 24px;text-align:center;color:#999;font-weight:700;">
    Redirecting… &nbsp;
    <a href="/en/" style="color:#FF9600;">English</a> &nbsp;·&nbsp; <a href="/ko/" style="color:#FF9600;">한국어</a>
  </div>
</body>
</html>
